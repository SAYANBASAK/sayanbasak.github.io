<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StationMadad Howrah Division</title>
    <meta
      name="description"
      content="StationMadad complaint and station issue management portal for Howrah Division."
    />
    <style>
:root {
  --rail-red: #b8232f;
  --rail-maroon: #7d1a27;
  --signal-green: #157a55;
  --notice-yellow: #f3b61f;
  --track-blue: #174c7c;
  --ink: #18212f;
  --muted: #667085;
  --line: #d9e0ea;
  --paper: #ffffff;
  --soft: #f4f7fb;
  --soft-red: #fff1f2;
  --soft-green: #ecfdf3;
  --soft-yellow: #fffaeb;
  --shadow: 0 16px 40px rgba(24, 33, 47, 0.12);
  font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  color: var(--ink);
  background: var(--soft);
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  cursor: pointer;
}

.hidden {
  display: none !important;
}

.login-shell {
  min-height: 100vh;
  display: grid;
  grid-template-columns: minmax(0, 1.2fr) minmax(360px, 480px);
  background: #101828;
}

.login-visual {
  position: relative;
  overflow: hidden;
}

.login-visual img {
  width: 100%;
  height: 100%;
  min-height: 100vh;
  object-fit: cover;
  object-position: center center;
  filter: saturate(0.9);
}

.visual-overlay {
  position: absolute;
  inset: auto 0 0 0;
  padding: clamp(28px, 6vw, 72px);
  color: white;
  background: linear-gradient(0deg, rgba(12, 21, 36, 0.86), rgba(12, 21, 36, 0));
}

.visual-overlay p,
.topbar p {
  margin: 0 0 6px;
  color: var(--notice-yellow);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0;
  font-size: 0.78rem;
}

.visual-overlay h1 {
  margin: 0;
  font-size: clamp(2.8rem, 7vw, 6.5rem);
  line-height: 0.95;
}

.visual-overlay span {
  display: block;
  margin-top: 14px;
  max-width: 560px;
  font-size: 1.05rem;
  color: #e8edf6;
}

.login-panel {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 26px;
  padding: clamp(24px, 5vw, 54px);
  background: var(--paper);
}

.brand-mark {
  display: flex;
  align-items: center;
  gap: 12px;
}

.brand-emblem {
  display: grid;
  place-items: center;
  width: 46px;
  height: 46px;
  border-radius: 8px;
  color: white;
  background: linear-gradient(135deg, var(--rail-red), var(--track-blue));
  font-weight: 900;
}

.brand-mark strong {
  display: block;
  font-size: 1.05rem;
}

.brand-mark small {
  color: var(--muted);
}

.login-form {
  display: grid;
  gap: 18px;
}

.login-form h2 {
  margin: 0;
  font-size: 2rem;
}

label {
  display: grid;
  gap: 8px;
  font-weight: 700;
  color: #344054;
}

input,
select,
textarea {
  width: 100%;
  min-height: 46px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px 12px;
  color: var(--ink);
  background: #fff;
  outline: none;
}

textarea {
  min-height: 108px;
  resize: vertical;
}

input:focus,
select:focus,
textarea:focus {
  border-color: var(--track-blue);
  box-shadow: 0 0 0 3px rgba(23, 76, 124, 0.12);
}

.password-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
}

.captcha-row {
  display: grid;
  grid-template-columns: auto minmax(80px, 1fr) auto;
  gap: 8px;
  align-items: center;
}

.captcha-row strong {
  min-height: 42px;
  display: inline-flex;
  align-items: center;
  padding: 0 12px;
  border-radius: 8px;
  background: #f8fafc;
  border: 1px solid var(--line);
}

.primary-btn,
.secondary-btn,
.icon-btn,
.chip-btn,
.demo-login {
  border: 1px solid transparent;
  border-radius: 8px;
  min-height: 42px;
  padding: 9px 14px;
  font-weight: 800;
}

.primary-btn {
  color: white;
  background: var(--rail-red);
}

.primary-btn:hover {
  background: var(--rail-maroon);
}

.secondary-btn,
.chip-btn,
.demo-login,
.icon-btn {
  color: var(--track-blue);
  background: #fff;
  border-color: var(--line);
}

.form-error {
  min-height: 20px;
  margin: 0;
  color: var(--rail-red);
  font-weight: 700;
}

.build-version {
  display: block;
  margin-top: 0.75rem;
  color: #68758a;
  font-size: 0.78rem;
  text-align: center;
}

.demo-box {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #f8fafc;
}

.app-shell {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 270px 1fr;
}

.sidebar {
  min-height: 100vh;
  padding: 22px;
  background: #122033;
  color: white;
}

.sidebar .brand-emblem {
  background: var(--notice-yellow);
  color: #122033;
}

.sidebar small {
  color: #b8c7da;
}

.nav-list {
  display: grid;
  gap: 8px;
  margin-top: 34px;
}

.nav-list button {
  min-height: 44px;
  border: 0;
  border-radius: 8px;
  padding: 10px 12px;
  text-align: left;
  color: #d9e7f7;
  background: transparent;
  font-weight: 800;
}

.nav-list button.active,
.nav-list button:hover {
  color: #122033;
  background: var(--notice-yellow);
}

.work-area {
  min-width: 0;
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  padding: 18px 26px;
  border-bottom: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.92);
  backdrop-filter: blur(14px);
}

.topbar h2 {
  margin: 0;
  font-size: 1.45rem;
}

.topbar-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.user-badge {
  display: inline-flex;
  align-items: center;
  min-height: 36px;
  padding: 7px 10px;
  border-radius: 8px;
  background: var(--soft);
  color: #344054;
  font-weight: 800;
}

.menu-btn {
  display: none;
}

.content {
  padding: 26px;
}

.view {
  display: none;
}

.active-view {
  display: block;
}

.grid {
  display: grid;
  gap: 18px;
}

.grid.two {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.grid.three {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.grid.four {
  grid-template-columns: repeat(4, minmax(0, 1fr));
}

.grid.five {
  grid-template-columns: repeat(5, minmax(0, 1fr));
}

.panel,
.stat-card,
.complaint-card {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--paper);
  box-shadow: 0 6px 18px rgba(16, 24, 40, 0.04);
}

.panel {
  padding: 18px;
}

.panel h3,
.panel h4,
.complaint-card h3,
.stat-card h3 {
  margin: 0;
}

.stat-card {
  padding: 16px;
}

.stat-card p {
  margin: 10px 0 0;
  font-size: 2rem;
  font-weight: 900;
}

.muted {
  color: var(--muted);
}

.section-title {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 14px;
  margin-bottom: 16px;
}

.section-title h3 {
  margin: 0;
  font-size: 1.2rem;
}

.toolbar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}

.toolbar input,
.toolbar select {
  width: auto;
  min-width: 180px;
}

.complaint-list {
  display: grid;
  gap: 12px;
}

.complaint-card {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 14px;
  padding: 16px;
}

.complaint-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 9px;
}

.pill {
  display: inline-flex;
  align-items: center;
  min-height: 28px;
  padding: 4px 9px;
  border-radius: 999px;
  background: #eef2f7;
  color: #344054;
  font-size: 0.82rem;
  font-weight: 800;
}

.pill.pending {
  background: var(--soft-yellow);
  color: #9a6700;
}

.pill.progress {
  background: #eff8ff;
  color: #175cd3;
}

.pill.partial {
  background: #f5f3ff;
  color: #6d28d9;
}

.pill.resolved {
  background: var(--soft-green);
  color: var(--signal-green);
}

.pill.critical {
  background: var(--soft-red);
  color: var(--rail-red);
}

.sla-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
  margin-top: 14px;
}

.sla-box {
  display: grid;
  gap: 4px;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: #f8fafc;
}

.sla-box strong {
  font-size: 0.9rem;
}

.sla-box span {
  color: var(--muted);
  font-weight: 800;
}

.sla-box.critical {
  background: var(--soft-red);
  color: var(--rail-red);
}

.alert-panel {
  border-color: #f2b8b5;
  background: #fffafa;
}

.alert-row {
  display: grid;
  grid-template-columns: 120px 1fr 1fr 120px 130px auto 80px;
  gap: 8px;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid #f3d4d2;
}

.alert-row:last-child {
  border-bottom: 0;
}

.chart-list {
  display: grid;
  gap: 10px;
  margin-top: 14px;
}

.chart-row {
  display: grid;
  grid-template-columns: minmax(170px, 240px) 1fr minmax(180px, auto);
  gap: 10px;
  align-items: center;
}

.chart-label {
  font-weight: 800;
  color: #344054;
}

.chart-track {
  height: 12px;
  border-radius: 999px;
  overflow: hidden;
  background: #e9eef5;
}

.chart-track span {
  display: block;
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--track-blue), var(--signal-green));
}

.chart-value {
  color: var(--muted);
  font-weight: 800;
  font-size: 0.86rem;
}

.stacked-chart {
  display: flex;
  height: 24px;
  overflow: hidden;
  border-radius: 8px;
  background: #e9eef5;
  margin: 16px 0 14px;
}

.stacked-chart.slim {
  height: 18px;
}

.stacked-chart span {
  display: block;
  min-width: 0;
}

.legend-grid {
  display: grid;
  gap: 8px;
  color: var(--muted);
  font-size: 0.88rem;
  font-weight: 800;
}

.legend-grid span {
  display: flex;
  align-items: center;
  gap: 8px;
}

.legend-grid i {
  width: 11px;
  height: 11px;
  border-radius: 999px;
  display: inline-block;
}

.pending,
.legend-grid i.pending {
  background: var(--notice-yellow);
}

.progress,
.legend-grid i.progress {
  background: var(--track-blue);
}

.partial,
.legend-grid i.partial {
  background: #7c3aed;
}

.closed,
.legend-grid i.closed {
  background: var(--signal-green);
}

.late,
.legend-grid i.late {
  background: var(--rail-red);
}

.mini-bar-grid {
  min-height: 160px;
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
  align-items: end;
  margin-top: 14px;
}

.mini-bar-item {
  min-width: 0;
  display: grid;
  justify-items: center;
  gap: 6px;
  color: var(--muted);
  font-size: 0.82rem;
  font-weight: 800;
  text-align: center;
}

.mini-bar {
  width: 100%;
  max-width: 42px;
  border-radius: 8px 8px 3px 3px;
  background: var(--track-blue);
}

.mini-bar.critical {
  background: var(--rail-red);
}

.mini-bar.high {
  background: #f97316;
}

.mini-bar.medium {
  background: var(--notice-yellow);
}

.mini-bar.low {
  background: var(--signal-green);
}

.report-summary .stat-card p {
  font-size: 1.35rem;
}

.timeline {
  display: grid;
  gap: 10px;
  margin-top: 14px;
}

.timeline-item {
  padding-left: 14px;
  border-left: 3px solid var(--line);
}

.timeline-item strong {
  display: block;
}

.table-wrap {
  overflow-x: auto;
}

.user-table input,
.user-table select {
  min-width: 140px;
  min-height: 38px;
  padding: 7px 9px;
}

.user-search-panel {
  margin-top: 14px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #f8fafc;
}

.user-search-panel label {
  min-width: 0;
}

.user-search-panel input,
.user-search-panel select {
  min-width: 0;
}

.user-branch-grid {
  margin: 14px 0;
}

.user-branch-btn {
  min-height: 74px;
  font-size: 1rem;
}

.user-table td:last-child {
  min-width: 170px;
}

.new-user-form label {
  min-width: 0;
}

.new-user-form input,
.new-user-form select {
  min-width: 0;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 760px;
}

th,
td {
  padding: 12px;
  border-bottom: 1px solid var(--line);
  text-align: left;
  vertical-align: top;
}

th {
  color: #344054;
  background: #f8fafc;
  font-size: 0.82rem;
  text-transform: uppercase;
}

dialog {
  width: min(780px, calc(100vw - 30px));
  border: 0;
  border-radius: 8px;
  padding: 0;
  box-shadow: var(--shadow);
}

dialog::backdrop {
  background: rgba(16, 24, 40, 0.48);
}

.dialog-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 18px;
  border-bottom: 1px solid var(--line);
}

.dialog-head h3 {
  margin: 0;
}

#dialogBody {
  padding: 18px;
}

.image-preview-block {
  display: grid;
  gap: 6px;
  margin: 12px 0;
}

.image-preview-block span {
  color: var(--muted);
  font-size: 13px;
}

.image-preview-frame {
  display: grid;
  gap: 6px;
}

.image-preview-failed {
  display: none;
}

.image-open-link {
  width: fit-content;
  color: var(--accent);
  font-size: 13px;
  font-weight: 700;
}

.image-preview-block img {
  width: min(100%, 520px);
  max-height: 300px;
  object-fit: contain;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #f8fafc;
}

.action-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 14px;
}

.toast {
  position: fixed;
  right: 18px;
  bottom: 18px;
  z-index: 5;
  padding: 12px 14px;
  border-radius: 8px;
  color: white;
  background: var(--signal-green);
  box-shadow: var(--shadow);
  font-weight: 800;
}

@media (max-width: 980px) {
  .login-shell,
  .app-shell {
    grid-template-columns: 1fr;
  }

  .login-visual {
    display: none;
  }

  .sidebar {
    position: fixed;
    inset: 0 auto 0 0;
    z-index: 4;
    width: 270px;
    transform: translateX(-100%);
    transition: transform 0.2s ease;
  }

  .sidebar.open {
    transform: translateX(0);
  }

  .menu-btn {
    display: inline-flex;
  }

  .grid.two,
  .grid.three,
  .grid.four,
  .grid.five {
    grid-template-columns: 1fr;
  }

  .sla-grid,
  .chart-row,
  .alert-row {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 620px) {
  .topbar,
  .content {
    padding: 14px;
  }

  .topbar {
    align-items: flex-start;
  }

  .topbar-actions {
    flex-direction: column;
    align-items: flex-end;
  }

  .complaint-card {
    grid-template-columns: 1fr;
  }

  .toolbar input,
  .toolbar select {
    width: 100%;
  }
}

    </style>
  </head>
  <body>
    <div id="loginPage" class="login-shell">
      <section class="login-visual" aria-label="Howrah Division">
        <img
          src="assets/howrah-division-wallpaper.png"
          alt="Howrah Division Indian Railways artwork"
        />
        <div class="visual-overlay">
          <p>Eastern Railway</p>
          <h1>StationMadad</h1>
          <span>Howrah Division station issue management portal</span>
        </div>
      </section>

      <main class="login-panel">
        <div class="brand-mark">
          <div class="brand-emblem">SM</div>
          <div>
            <strong>StationMadad</strong>
            <small>Howrah Division</small>
          </div>
        </div>

        <form id="loginForm" class="login-form">
          <h2>Login</h2>
          <label>
            Username / USMID
            <input id="username" name="username" autocomplete="username" required />
          </label>
          <label>
            Password
            <div class="password-row">
              <input id="password" name="password" type="password" autocomplete="current-password" required />
              <button type="button" id="togglePassword" class="icon-btn" aria-label="Show password">show</button>
            </div>
          </label>
          <label>
            Captcha verification
            <div class="captcha-row">
              <strong id="captchaQuestion"></strong>
              <input id="captchaAnswer" name="captchaAnswer" inputmode="numeric" placeholder="Answer" required />
              <button type="button" id="refreshCaptcha" class="icon-btn" aria-label="Refresh captcha">refresh</button>
            </div>
          </label>
          <p id="loginError" class="form-error" role="alert"></p>
          <button class="primary-btn" type="submit">Login</button>
          <small class="build-version">Build: 14 Jul 2026, 18:10 IST</small>
        </form>
        <script>
          (function () {
            function makeLoginCaptcha() {
              var left = Math.floor(10 + Math.random() * 40);
              var right = Math.floor(1 + Math.random() * 20);
              window.stationMadadCaptchaAnswer = String(left + right);
              var question = document.getElementById("captchaQuestion");
              var answer = document.getElementById("captchaAnswer");
              if (question) question.textContent = left + " + " + right + " =";
              if (answer) answer.value = "";
            }

            window.stationMadadGenerateCaptcha = makeLoginCaptcha;
            makeLoginCaptcha();
            document.getElementById("refreshCaptcha")?.addEventListener("click", makeLoginCaptcha);
          })();
        </script>
      </main>
    </div>

    <div id="appShell" class="app-shell hidden">
      <aside class="sidebar">
        <div class="brand-mark">
          <div class="brand-emblem">SM</div>
          <div>
            <strong>StationMadad</strong>
            <small>Howrah Division</small>
          </div>
        </div>

        <nav class="nav-list" aria-label="Main navigation">
          <button data-view="dashboard" class="active">Dashboard</button>
          <button data-view="newComplaint">Raise Complaint</button>
          <button data-view="complaints">Complaints</button>
          <button data-view="departmentDesk">Department Desk</button>
          <button data-view="reports">Reports</button>
          <button data-view="settings">Masters</button>
          <button data-view="userManagement">User Control</button>
        </nav>
      </aside>

      <div class="work-area">
        <header class="topbar">
          <button id="menuBtn" class="icon-btn menu-btn" aria-label="Open menu">menu</button>
          <div>
            <p id="roleLabel">Station Manager</p>
            <h2 id="pageTitle">Dashboard</h2>
          </div>
          <div class="topbar-actions">
            <span id="userBadge" class="user-badge"></span>
            <button id="logoutBtn" class="secondary-btn">Logout</button>
          </div>
        </header>

        <main class="content">
          <section id="dashboard" class="view active-view"></section>
          <section id="newComplaint" class="view"></section>
          <section id="complaints" class="view"></section>
          <section id="departmentDesk" class="view"></section>
          <section id="reports" class="view"></section>
          <section id="settings" class="view"></section>
          <section id="userManagement" class="view"></section>
        </main>
      </div>
    </div>

    <dialog id="complaintDialog">
      <div class="dialog-head">
        <h3 id="dialogTitle">Complaint details</h3>
        <button id="closeDialog" class="icon-btn" aria-label="Close">x</button>
      </div>
      <div id="dialogBody"></div>
    </dialog>
    <script>
// Generated from Station search [ICMS _ UTIL _ 1022].pdf on 03-Jul-2026.
window.howrahStations = [
  {
    "code": "ABGM",
    "name": "AMBALGRAM"
  },

  },
  {
    "code": "ADP",

  },
  {
    "code": "ADST",

  },
  {
    "code": "AGAE",
    "name": "AGRADWIP"
  },
  {

function statCounts(list) {
  return {
    total: list.length,
    pending: list.filter((item) => item.status === "Pending").length,
    progress: list.filter((item) => item.status === "In Progress").length,
    partial: list.filter((item) => item.status === "Partial Resolution").length,
    closed: list.filter((item) => item.status === "Closed").length,
  };
}

function dueDateEnd(item) {
  const due = new Date(item.dueAt || item.createdAt || Date.now());
  due.setHours(23, 59, 59, 999);
  return due;
}

function isFinalStatus(status) {
  return status === "Closed";
}

function isWithinTime(item) {
  if (!isFinalStatus(item.status)) return false;
  const completedAt = new Date(item.lastUpdatedAt || item.submittedAt || item.createdAt || Date.now());
  return completedAt <= dueDateEnd(item);
}

function daysRemaining(item) {
  return Math.ceil((dueDateEnd(item) - new Date()) / 86400000);
}

function dashboardAlerts(list) {
  const monitoredRoles = ["supervisor", "control", "bo", "super", "admin"];
  if (!monitoredRoles.includes(state.user.role)) return [];
  return list
    .filter((item) => !isFinalStatus(item.status))
    .map((item) => ({
      ...item,
      remaining: daysRemaining(item),
      noActivity: !item.lastUpdatedAt && (!item.history || item.history.length <= 1),
    }))
    .filter((item) => item.remaining <= 1 || item.noActivity)
    .sort((a, b) => a.remaining - b.remaining)
    .slice(0, 8);
}

function priorityDurationPanel() {

  `;
}

          <span>${item.station}</span>
          <span>${item.department}</span>
          <span>${item.status}</span>
          <span>${item.remaining < 0 ? `${Math.abs(item.remaining)} day overdue` : `${item.remaining} day left`}</span>
          ${item.noActivity ? "<span class=\"pill critical\">No activity</span>" : ""}
          <button class="secondary-btn" data-open="${item.id}">Open</button>
        </div>
      `).join("") : `<p class="muted">No complaints nearing time limit or pending without activity.</p>`}
    </section>
  `;
}

function departmentChart(list) {
  const max = Math.max(1, ...departments.map((dept) => list.filter((item) => item.department === dept).length));
  return `
    <section class="panel">
      <h3>Department performance</h3>
      <div class="chart-list">
        ${departments.map((dept) => {
          const received = list.filter((item) => item.department === dept).length;
          const closedWithin = list.filter((item) => item.department === dept && item.status === "Closed" && isWithinTime(item)).length;
          const width = Math.max(4, Math.round((received / max) * 100));
          return `
            <div class="chart-row">
              <div class="chart-label">${dept}</div>
              <div class="chart-track"><span style="width:${width}%"></span></div>
              <div class="chart-value">${received} received / ${closedWithin} closed in time</div>
            </div>
          `;
        }).join("")}
      </div>
    </section>
  `;
}

function statusChart(list) {
  const counts = statCounts(list);
  const segments = [
    ["Pending", counts.pending, "pending"],
    ["In Progress", counts.progress, "progress"],
    ["Partial Resolution", counts.partial, "partial"],
    ["Closed", counts.closed, "closed"],
  ];
  const total = Math.max(1, counts.total);
  return `
    <section class="panel">
      <h3>Status spread</h3>
      <div class="stacked-chart" aria-label="Complaint status spread">
        ${segments.map(([label, value, kind]) => `<span class="${kind}" style="width:${Math.max(value ? 5 : 0, Math.round((value / total) * 100))}%" title="${label}: ${value}"></span>`).join("")}
      </div>
      <div class="legend-grid">
        ${segments.map(([label, value, kind]) => `<span><i class="${kind}"></i>${label}: <strong>${value}</strong></span>`).join("")}
      </div>
    </section>
  `;
}

function priorityChart(list) {
  const priorities = ["Critical", "High", "Medium", "Low"];
  const max = Math.max(1, ...priorities.map((priority) => list.filter((item) => item.priority === priority).length));
  return `
    <section class="panel">
      <h3>Priority load</h3>
      <div class="mini-bar-grid">
        ${priorities.map((priority) => {
          const count = list.filter((item) => item.priority === priority).length;
          const height = Math.max(count ? 16 : 4, Math.round((count / max) * 110));
          return `<div class="mini-bar-item"><div class="mini-bar ${priority.toLowerCase()}" style="height:${height}px"></div><strong>${count}</strong><span>${priority}</span></div>`;
        }).join("")}
      </div>
    </section>
  `;
}

function closureChart(list) {
  const closed = list.filter((item) => item.status === "Closed");
  const inTime = closed.filter(isWithinTime).length;
  const late = Math.max(0, closed.length - inTime);
  const denominator = Math.max(1, closed.length);
  return `
    <section class="panel">
      <h3>Closure discipline</h3>
      <div class="stacked-chart slim">
        <span class="closed" style="width:${Math.round((inTime / denominator) * 100)}%" title="Closed in time: ${inTime}"></span>
        <span class="late" style="width:${Math.round((late / denominator) * 100)}%" title="Closed late: ${late}"></span>
      </div>
      <div class="legend-grid">
        <span><i class="closed"></i>Closed in time: <strong>${inTime}</strong></span>
        <span><i class="late"></i>Closed late: <strong>${late}</strong></span>
      </div>
    </section>
  `;
}

function renderDashboard() {
  const list = allowedComplaints();
  const counts = statCounts(list);
  const alerts = dashboardAlerts(list);
  qs("#dashboard").innerHTML = `
    <div class="grid four">
      <article class="stat-card"><h3>Total complaints</h3><p>${counts.total}</p></article>
      <article class="stat-card"><h3>Pending</h3><p>${counts.pending}</p></article>
      <article class="stat-card"><h3>In progress</h3><p>${counts.progress}</p></article>
      <article class="stat-card"><h3>Closed</h3><p>${counts.closed}</p></article>
    </div>
    <div class="grid three" style="margin-top:18px">
      ${statusChart(list)}
      ${priorityChart(list)}
      ${closureChart(list)}
    </div>
    <div style="margin-top:18px">${priorityDurationPanel()}</div>
    ${alerts.length || ["supervisor", "control", "bo", "super", "admin"].includes(state.user.role) ? `<div style="margin-top:18px">${alertPanel(alerts)}</div>` : ""}
    <div class="grid two" style="margin-top:18px">
      <section class="panel">
        <div class="section-title">
          <h3>Recent station issues</h3>
          <div class="action-row compact-actions">
            <button class="chip-btn" data-sync-sheets="1">Sync Google Sheet</button>
            <button class="chip-btn" data-jump="complaints">View all</button>
          </div>
        </div>
        <div class="complaint-list">
          ${list.slice(0, 4).map(complaintCard).join("") || emptyState("No complaints visible for this role.")}
        </div>
      </section>
      <section class="panel">
        <h3>Department workload</h3>
        <div class="table-wrap" style="margin-top:14px">
          <table>
            <thead><tr><th>Department</th><th>Open</th><th>Closed</th></tr></thead>
            <tbody>${departmentRows(list)}</tbody>
          </table>
        </div>
      </section>
    </div>
    <div style="margin-top:18px">${departmentChart(list)}</div>
  `;
}

function departmentRows(list) {
  return departments
    .map((dept) => {
      const deptItems = list.filter((item) => item.department === dept);

async function submitComplaint(event) {
  event.preventDefault();
  const data = Object.fromEntries(new FormData(event.currentTarget).entries());
  const attachmentFile = event.currentTarget.elements.attachment?.files?.[0];
  const next = state.complaints.length + 1;
  const created = new Date();
  const complaintDateTime = new Date(`${data.complaintDate}T${data.complaintTime || "00:00"}`);
  const due = new Date(complaintDateTime);
  due.setDate(complaintDateTime.getDate() + (priorityDurations[data.priority]?.days || 4));
  const attachmentInfo = attachmentFile
    ? {
        name: attachmentFile.name,
        type: attachmentFile.type,
        size: attachmentFile.size,
        uploadedAt: created.toISOString(),
        dataUrl: await fileToDataUrl(attachmentFile),
        uploadedBy: state.user.name,
      }
    : null;
  const complaint = {
    id: `HWH-2026-${String(next).padStart(4, "0")}`,
    station: data.station,
    department: data.department,
    category: data.category,
    location: data.location,
    priority: data.priority,
    priorityDuration: priorityDurations[data.priority]?.label || "",
    subject: data.subject,
    description: data.description,
    status: "Pending",
    raisedBy: state.user.name,
    createdAt: complaintDateTime.toISOString(),
    complaintDate: data.complaintDate,
    complaintTime: data.complaintTime,
    submittedAt: created.toISOString(),
    dueAt: due.toISOString().slice(0, 10),
    attachmentName: attachmentInfo?.name || "",
    attachmentType: attachmentInfo?.type || "",
    attachmentDataUrl: attachmentInfo?.dataUrl || "",
    attachmentUploadedAt: attachmentInfo?.uploadedAt || "",
    history: [["Raised", state.user.name, `Complaint registered and sent to ${data.department}.`]],
  };
  state.complaints.unshift(complaint);
  saveComplaints();
  syncComplaintToGoogleSheet(complaint, "created");
  showToast(`Complaint ${complaint.id} submitted`);
  setView("dashboard");
}

function formatDate(value) {

function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(reader.error);
    reader.readAsDataURL(file);
  });
}

function imageToCompressedDataUrl(file, maxSide = 1200, quality = 0.78) {
  if (!file?.type?.startsWith("image/")) return fileToDataUrl(file);
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(reader.error);
    reader.onload = () => {
      const image = new Image();
      image.onerror = () => reject(new Error("Could not read image."));
      image.onload = () => {
        const scale = Math.min(1, maxSide / Math.max(image.width, image.height));
        const canvas = document.createElement("canvas");
        canvas.width = Math.max(1, Math.round(image.width * scale));
        canvas.height = Math.max(1, Math.round(image.height * scale));
        const context = canvas.getContext("2d");
        context.drawImage(image, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      image.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function driveFileIdFromUrl(url) {
  const value = String(url || "");
  return value.match(/[?&]id=([^&]+)/)?.[1]
    || value.match(/\/file\/d\/([^/]+)/)?.[1]
    || value.match(/\/d\/([^/]+)/)?.[1]
    || "";
}

function previewImageUrl(src) {
  const fileId = driveFileIdFromUrl(src);
  if (fileId) return `https://drive.google.com/thumbnail?id=${encodeURIComponent(fileId)}&sz=w1200`;
  return src;
}

function fullImageUrl(src) {
  const fileId = driveFileIdFromUrl(src);
  if (fileId) return `https://drive.google.com/file/d/${encodeURIComponent(fileId)}/view?usp=sharing`;
  return src;
}

function isWebImageLink(src) {
  return /^https?:\/\//i.test(String(src || ""));
}

function imagePreviewBlock(title, name, src, meta = "") {
  if (!src) return `<p class="muted">${title}: ${name || "None"}</p>`;
  const previewSrc = previewImageUrl(src);
  const openSrc = fullImageUrl(src);
  const openLink = isWebImageLink(openSrc)
    ? `<a class="image-open-link" href="${escapeHtml(openSrc)}" target="_blank" rel="noopener noreferrer">Open full image</a>`
    : "";
  return `
    <div class="image-preview-block">
      <strong>${title}: ${escapeHtml(name || "Image")}</strong>
      ${meta ? `<span>${escapeHtml(meta)}</span>` : ""}
      <div class="image-preview-frame">
        <img src="${escapeHtml(previewSrc)}" alt="${escapeHtml(name || title)}" loading="lazy" referrerpolicy="no-referrer" onerror="this.classList.add('image-preview-failed'); this.nextElementSibling.classList.remove('hidden');" />
        <span class="muted hidden">Preview not available here. Use Open full image.</span>
      </div>
      ${openLink}
    </div>
  `;
}

function attachmentPreview(item) {
  const src = item.attachmentDataUrl || item.attachmentImageUrl || item.attachmentUrl || "";
  const uploadButton = item.attachmentDataUrl && !item.attachmentImageUrl && !item.attachmentUrl
    ? `<button class="secondary-btn" data-resync-attachment="${escapeHtml(item.id)}" style="margin-top:10px">Upload attachment image to Google Sheet</button>`
    : "";
  if (!src && item.attachmentName) {
    return `<p class="muted">Attachment: ${escapeHtml(item.attachmentName)} (image not available from Google Sheet yet)</p>`;
  }
  return `${imagePreviewBlock("Attachment", item.attachmentName, src, item.attachmentUploadedAt ? `uploaded ${formatDateTime(item.attachmentUploadedAt)}` : "")}${uploadButton}`;
}

function rectificationPreview(item) {
  const images = compactImages(item.rectificationImages || []);
  if (images.length) {
    return images
      .map((image) => imagePreviewBlock("Rectification image", image.name, image.dataUrl || image.url, image.uploadedAt ? `uploaded ${formatDateTime(image.uploadedAt)}` : ""))
      .join("");
  }
  return item.rectificationImageUrl ? imagePreviewBlock("Rectification image", item.rectificationImageName, item.rectificationImageUrl) : "";
}

function compactHistory(history = []) {
  return history.filter((entry, index, list) => {
    const previous = list[index - 1];
    return !previous || previous[0] !== entry[0] || previous[1] !== entry[1] || previous[2] !== entry[2];
  });
}

function compactImages(images = []) {
  const seen = new Set();
  return images.filter((image) => {
    const normalizedName = String(image.name || "").trim().toLowerCase();
    const driveId = driveFileIdFromUrl(image.url || "");
    const dataFingerprint = image.fingerprint || (image.dataUrl ? `${image.dataUrl.length}:${image.dataUrl.slice(-160)}` : "");
    const key = driveId || dataFingerprint || normalizedName;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function complaintVersionTime(item = {}) {
  return new Date(item.lastUpdatedAt || item.syncedAt || item.submittedAt || item.createdAt || item.complaintDate || 0).getTime() || 0;
}

function remoteRectificationImages(remote = {}) {
  if (!remote.rectificationImageUrl) return [];
  return compactImages([{
    name: remote.rectificationImageName || "Rectification image",
    url: remote.rectificationImageUrl,
    uploadedAt: remote.lastUpdatedAt || remote.syncedAt || "",
    uploadedBy: remote.lastUpdatedBy || "Google Sheet",
  }]);
}

function googleSheetPayload(item, action) {
  const images = compactImages(item.rectificationImages || []);
  const latestImage = images.length ? images[images.length - 1] : null;
  return {
    action,
    sheetId: googleSheetId,
    id: item.id,
    station: item.station,
    department: item.department,
    category: item.category,
    location: item.location,
    priority: item.priority,
    subject: item.subject,
    description: item.description,
    status: item.status,
    raisedBy: item.raisedBy,
    complaintDate: item.complaintDate || (item.createdAt || "").slice(0, 10),
    complaintTime: item.complaintTime || "",
    submittedAt: item.submittedAt || item.createdAt,
    dueAt: item.dueAt,
    attachmentName: item.attachmentName || "",
    attachmentType: item.attachmentType || "",
    attachmentDataUrl: item.attachmentDataUrl || "",
    attachmentImageUrl: item.attachmentImageUrl || item.attachmentUrl || "",
    lastUpdatedAt: item.lastUpdatedAt || "",
    lastUpdatedBy: item.lastUpdatedBy || "",
    rectificationImageName: latestImage?.name || "",
    rectificationImageDataUrl: latestImage?.dataUrl || "",
    rectificationImageType: latestImage?.type || "",
    forwardedDivision: item.forwardedDivision || "",
    historyJson: JSON.stringify(compactHistory(item.history || [])),
  };
}

function mergeUsers(remoteUsers, inactiveUsers = [], inactiveUserDetails = {}) {
  const inactiveSet = new Set((inactiveUsers || []).map((username) => String(username).toLowerCase()));
  state.users = { ...demoUsers, ...state.users, ...(remoteUsers || {}) };
  inactiveSet.forEach((username) => {
    const existing = inactiveUserDetails[username] || state.users[username] || state.inactiveUsers[username] || demoUsers[username];
    if (existing) state.inactiveUsers[username] = existing;
    delete state.users[username];
  });
  Object.keys(remoteUsers || {}).forEach((username) => {
    delete state.inactiveUsers[username];
  });
  saveUsers();
  saveInactiveUsers();
}

function loadUsersFromGoogleSheet(showMessage = false) {
  const webAppUrl = getUserSheetsWebAppUrl();
  if (!webAppUrl) return Promise.resolve(false);
  return new Promise((resolve) => {
    const callbackName = `stationMadadUsersCallback_${Date.now()}`;
    const separator = webAppUrl.includes("?") ? "&" : "?";
    const script = document.createElement("script");
    const finish = (ok) => {
      delete window[callbackName];
      script.remove();
      resolve(ok);
    };
    const timer = window.setTimeout(() => finish(false), 3500);
    window[callbackName] = (response) => {
      window.clearTimeout(timer);
      try {
        if (response?.ok && response.users) {
          mergeUsers(response.users, response.inactiveUsers || [], response.inactiveUserDetails || {});
          if (showMessage) showToast(`${Object.keys(response.users).length} users synced from Google Sheet`);
          if (state.currentView === "userManagement") renderUserManagement();
          finish(true);
        } else {
          if (showMessage) showToast("User Google Sheet returned no data.");
          finish(false);
        }
      } catch (error) {
        console.warn("User Google Sheet read failed", error);
        finish(false);
      }
    };
    script.onerror = () => {
      window.clearTimeout(timer);
      if (showMessage) showToast("Could not read user Google Sheet. Check Apps Script deployment.");
      finish(false);
    };
    script.src = `${webAppUrl}${separator}action=listUsers&callback=${callbackName}`;
    document.body.appendChild(script);
  });
}

function mergeComplaints(remoteComplaints) {
  const byId = new Map(state.complaints.map((item) => [item.id, item]));
  remoteComplaints.forEach((remote) => {
    const existing = byId.get(remote.id) || {};
    const existingTime = complaintVersionTime(existing);
    const remoteTime = complaintVersionTime(remote);
    const keepLocal = existing.id && existingTime > remoteTime;
    const base = keepLocal ? { ...remote, ...existing } : { ...existing, ...remote };
    base.history = compactHistory(keepLocal && existing.history?.length ? existing.history : (remote.history?.length ? remote.history : existing.history));
    base.rectificationImages = compactImages([...(existing.rectificationImages || []), ...remoteRectificationImages(remote)]);
    byId.set(remote.id, base);
    if (keepLocal && existing.lastUpdatedAt) {
      syncComplaintToGoogleSheet(existing, "updated");
    }
  });
  state.complaints = [...byId.values()].sort((a, b) => new Date(b.submittedAt || b.createdAt || 0) - new Date(a.submittedAt || a.createdAt || 0));
  saveComplaints();
}

function shouldRenderAfterSheetSync(showMessage) {
  if (showMessage) return true;
  const active = document.activeElement;
  if (state.currentView === "newComplaint") return false;
  if (active && ["INPUT", "SELECT", "TEXTAREA"].includes(active.tagName)) return false;
  return true;
}

function loadComplaintsFromGoogleSheet(showMessage = true) {
  const webAppUrl = getSheetsWebAppUrl();
  if (!webAppUrl) {
    if (showMessage) showToast("Google Sheet Web App URL is not configured.");
    return;
  }
  const callbackName = `stationMadadSheetCallback_${Date.now()}`;
  const separator = webAppUrl.includes("?") ? "&" : "?";
  const script = document.createElement("script");
  window[callbackName] = (response) => {
    try {
      if (response?.ok && Array.isArray(response.complaints)) {
        mergeComplaints(response.complaints);
        if (showMessage) showToast(`${response.complaints.length} complaints synced from Google Sheet`);
        if (shouldRenderAfterSheetSync(showMessage)) render();
      } else if (showMessage) {
        showToast("Google Sheet sync returned no data.");
      }
    } finally {
      delete window[callbackName];
      script.remove();
    }
  };
  script.onerror = () => {
    delete window[callbackName];
    script.remove();
    if (showMessage) showToast("Could not read Google Sheet. Check Apps Script deployment.");
  };
  script.src = `${webAppUrl}${separator}action=list&callback=${callbackName}`;
  document.body.appendChild(script);
}

function updateAttendingFields() {

  const fieldRules = {
    department: action === "forwardDepartment",
    division: action === "forwardDivision",
    image: action === "partial" || action === "closed",
  };
  qsa("[data-attending-field]").forEach((field) => {
    field.classList.toggle("hidden", !fieldRules[field.dataset.attendingField]);
  });
  const remark = qs("#statusRemark");
  if (!remark) return;
  const placeholders = {
    partial: "Partial resolution remarks",
    forwardDepartment: "Forwarding remarks",
    forwardDivision: "Forwarding remarks",
    closed: "Closing remarks",
  };
  remark.placeholder = placeholders[action] || "Remarks";
}

async function updateStatus(id) {
  if (statusUpdatesInProgress.has(id)) return;
  if (state.user.role !== "control") {
    showToast("Only Departmental Control users can record complaint actions.");
    return;
  }
  const item = state.complaints.find((complaint) => complaint.id === id);
  if (!item) return;
  if (item.status === "Closed") {
    showToast("Closed complaints are view only. Super user can reopen to Pending.");
    return;
  }
  statusUpdatesInProgress.add(id);
  const updateButton = qs(`[data-update-status="${CSS.escape(id)}"]`);
  if (updateButton) {
    updateButton.disabled = true;
    updateButton.textContent = "Updating...";
  }
  const actionType = qs("#attendingAction")?.value || "partial";
  const forwardedDepartment = qs("#forwardDepartment")?.value || item.department;
  const forwardedDivision = qs("#forwardDivision")?.value.trim() || "";
  const remarkInput = qs("#statusRemark")?.value.trim() || "";
  const imageFile = ["partial", "closed"].includes(actionType) ? qs("#rectificationImage")?.files?.[0] : null;
  try {
    let imageInfo = null;
    let imageInfoForSync = null;
    if (imageFile) {
      const compressedDataUrl = await imageToCompressedDataUrl(imageFile);
      imageInfo = {
        name: imageFile.name,
        type: "image/jpeg",
        size: compressedDataUrl.length,
        uploadedAt: new Date().toISOString(),
        uploadedBy: state.user.name,
        dataUrl: compressedDataUrl,
        fingerprint: `${imageFile.name.toLowerCase()}|${compressedDataUrl.length}|${compressedDataUrl.slice(-160)}`,
      };
      imageInfoForSync = {
        ...imageInfo,
      };
    }
    let newStatus = "Partial Resolution";
    let historyStatus = "Partial Resolution";
    let remark = remarkInput || "Partially attended; further action is pending.";
    if (actionType === "forwardDepartment") {
      newStatus = "In Progress";
      historyStatus = "Forwarded to Department";
      item.department = forwardedDepartment;
      remark = remarkInput || `Forwarded to ${forwardedDepartment}.`;
    } else if (actionType === "forwardDivision") {
      newStatus = "In Progress";
      historyStatus = "Forwarded to Division";
      item.forwardedDivision = forwardedDivision;
      remark = remarkInput || `Forwarded to ${forwardedDivision || "other division"}.`;
    } else if (actionType === "closed") {
      newStatus = "Closed";
      historyStatus = "Closed";
      remark = remarkInput || "Complaint closed after attending the issue.";
    }

    item.status = newStatus;
    item.lastUpdatedAt = new Date().toISOString();
    item.lastUpdatedBy = state.user.name;
    if (imageInfo) item.rectificationImages = compactImages([...(item.rectificationImages || []), imageInfo]);
    else item.rectificationImages = compactImages(item.rectificationImages || []);
    item.history = compactHistory(item.history || []);
    const lastEntry = item.history[item.history.length - 1];
    if (!lastEntry || lastEntry[0] !== historyStatus || lastEntry[1] !== state.user.name || lastEntry[2] !== remark) {
      item.history.push([historyStatus, state.user.name, remark]);
    }
    saveComplaints();
    const syncItem = imageInfoForSync
      ? { ...item, rectificationImages: compactImages(item.rectificationImages || []) }
      : item;
    syncComplaintToGoogleSheet(syncItem, "updated");
    qs("#complaintDialog").close();
    showToast(`${item.id} updated`);
    render();
  } catch (error) {
    console.warn("Status update failed", error);
    showToast("Status update failed. Please try again.");
    if (updateButton) {
      updateButton.disabled = false;
      updateButton.textContent = "Update status";
    }
  } finally {
    statusUpdatesInProgress.delete(id);
  }
}

function reopenComplaint(id) {
  if (state.user.role !== "super") {
    showToast("Only super user can reopen closed complaints.");
    return;
  }
  const item = state.complaints.find((complaint) => complaint.id === id);
  if (!item) return;
  if (item.status !== "Closed") {
    showToast("Only closed complaints can be reopened.");
    return;
  }
  const remark = qs("#reopenRemark")?.value.trim() || "Reopened by super user for further action.";
  item.status = "Pending";
  item.lastUpdatedAt = new Date().toISOString();
  item.lastUpdatedBy = state.user.name;
  item.history = compactHistory(item.history || []);
  item.history.push(["Reopened", state.user.name, remark]);
  saveComplaints();
  syncComplaintToGoogleSheet(item, "updated");
  qs("#complaintDialog").close();
  showToast(`${item.id} reopened to Pending`);
  render();
}

function filteredReportComplaints() {
  const period = qs("#reportPeriod")?.value || "daily";
  const dateValue = qs("#reportDate")?.value || new Date().toISOString().slice(0, 10);
  const dept = qs("#reportDept")?.value || "";
  const anchor = new Date(`${dateValue}T00:00:00`);
  const end = new Date(anchor);
  if (period === "daily") end.setDate(anchor.getDate() + 1);
  if (period === "weekly") end.setDate(anchor.getDate() + 7);
  if (period === "monthly") end.setMonth(anchor.getMonth() + 1);
  if (period === "yearly") end.setFullYear(anchor.getFullYear() + 1);
  return allowedComplaints().filter((item) => {
    const created = new Date(item.submittedAt || item.createdAt);
    return created >= anchor && created < end && (!dept || item.department === dept);
  });
}

function reportSummary(list) {
  const total = list.length || 1;
  const count = (status) => list.filter((item) => item.status === status).length;
  return {
    received: list.length,
    pending: count("Pending"),
    progress: count("In Progress"),
    partial: count("Partial Resolution"),
    closed: count("Closed"),
    pct(value) {
      return `${Math.round((value / total) * 100)}%`;
    },
  };
}

function downloadBlob(content, filename, type) {
  const blob = content instanceof Blob ? content : new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = filename;
  link.click();
  URL.revokeObjectURL(url);
}

function makeSimplePdf(lines) {
  const safe = (text) => String(text).replace(/[^\x20-\x7E]/g, "?").replace(/[()\\]/g, "\\$&").slice(0, 110);
  const content = lines.map((line, index) => `BT /F1 10 Tf 40 ${780 - index * 16} Td (${safe(line)}) Tj ET`).join("\n");
  const objects = [
    "<< /Type /Catalog /Pages 2 0 R >>",
    "<< /Type /Pages /Kids [3 0 R] /Count 1 >>",
    "<< /Type /Page /Parent 2 0 R /MediaBox [0 0 595 842] /Resources << /Font << /F1 4 0 R >> >> /Contents 5 0 R >>",
    "<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>",
    `<< /Length ${content.length} >>\nstream\n${content}\nendstream`,
  ];
  let pdf = "%PDF-1.4\n";
  const offsets = [0];
  objects.forEach((object, index) => {
    offsets.push(pdf.length);
    pdf += `${index + 1} 0 obj\n${object}\nendobj\n`;
  });
  const xref = pdf.length;
  pdf += `xref\n0 ${objects.length + 1}\n0000000000 65535 f \n`;
  offsets.slice(1).forEach((offset) => {
    pdf += `${String(offset).padStart(10, "0")} 00000 n \n`;
  });
  pdf += `trailer << /Size ${objects.length + 1} /Root 1 0 R >>\nstartxref\n${xref}\n%%EOF`;
  return new Blob([pdf], { type: "application/pdf" });
}

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;");
}

function normalizeRole(value) {
  const role = String(value || "").trim().toLowerCase();
  if (["station", "station master", "station manager", "sm"].includes(role)) return "station-manager";
  if (["supervisor", "traffic inspector", "loco inspector", "ti", "li"].includes(role)) return "supervisor";
  if (["control", "control office", "departmental control", "departmental control office"].includes(role)) return "control";
  if (["bo", "branch officer"].includes(role)) return "bo";
  if (["super", "super user", "superuser"].includes(role)) return "super";
  if (["admin", "divisional admin"].includes(role)) return "admin";
  if (["department", "department officer"].includes(role)) return "department";
  return role || "station-manager";
}

function splitStations(value) {
  return String(value || "")
    .split(/[|;]/)
    .map((item) => item.trim())
    .filter(Boolean);
}

function filteredUserEntries(kind) {
  const source = kind === "inactive" ? state.inactiveUsers : state.users;
  const filter = state.userFilters[kind] || {};
  return Object.entries(source)
    .filter(([username, user]) => {
      const haystack = {
        username,
        name: user.name || "",
        location: user.station || (user.stations || []).join("; "),
        phone: user.phone || "",
      };
      if (filter.role && user.role !== filter.role) return false;
      if (filter.name && !haystack.name.toLowerCase().includes(filter.name.toLowerCase())) return false;
      if (filter.location && !haystack.location.toLowerCase().includes(filter.location.toLowerCase())) return false;
      if (filter.username && !username.toLowerCase().includes(filter.username.toLowerCase())) return false;
      if (filter.phone && !haystack.phone.includes(filter.phone)) return false;
      if (filter.mobileVerified === "yes" && !haystack.phone) return false;
      if (filter.mobileVerified === "no" && haystack.phone) return false;
      if (filter.category === "station" && user.role !== "station-manager") return false;
      if (filter.category === "department" && !["control", "bo", "department"].includes(user.role)) return false;
      if (filter.category === "supervisory" && user.role !== "supervisor") return false;
      return true;
    })
    .sort(([a], [b]) => a.localeCompare(b))
}

            ${departments.map((dept) => `<option ${user.department === dept ? "selected" : ""}>${dept}</option>`).join("")}
          </select>

        <td><input data-user-edit="${escapeHtml(username)}" data-user-kind="${kind}" data-field="reason" value="${escapeHtml(user.reason || "")}" placeholder="Reason" /></td>
        <td><input data-user-edit="${escapeHtml(username)}" data-user-kind="${kind}" data-field="password" value="${escapeHtml(user.password)}" /></td>

          ${isInactive ? `<button class="secondary-btn" data-activate-user="${escapeHtml(username)}">Activate</button>` : `<button class="secondary-btn" data-delete-user="${escapeHtml(username)}">Deactivate</button>`}
        </td>
      </tr>
    `)
    .join("") || `<tr><td colspan="15">${emptyState(`No ${kind} users matched.`)}</td></tr>`;
}

function parseDelimited(text) {
  const rows = [];
  let row = [];
  let cell = "";
  let quoted = false;
  const delimiter = text.includes("\t") && !text.includes(",") ? "\t" : ",";
  for (let i = 0; i < text.length; i += 1) {
    const char = text[i];
    const next = text[i + 1];
    if (char === '"' && quoted && next === '"') {
      cell += '"';
      i += 1;
    } else if (char === '"') {
      quoted = !quoted;
    } else if (char === delimiter && !quoted) {
      row.push(cell.trim());
      cell = "";
    } else if ((char === "\n" || char === "\r") && !quoted) {
      if (char === "\r" && next === "\n") i += 1;
      row.push(cell.trim());
      if (row.some(Boolean)) rows.push(row);
      row = [];
      cell = "";
    } else {
      cell += char;
    }
  }
  row.push(cell.trim());
  if (row.some(Boolean)) rows.push(row);
  return rows;
}

function parseHtmlTable(text) {
  const doc = new DOMParser().parseFromString(text, "text/html");
  return [...doc.querySelectorAll("tr")].map((tr) => [...tr.children].map((cell) => cell.textContent.trim())).filter((row) => row.length);
}

function rowsToUsers(rows) {
  if (rows.length < 2) return {};
  const headers = rows[0].map((item) => item.toLowerCase().replace(/[^a-z]/g, ""));
  const find = (...names) => names.map((name) => headers.indexOf(name)).find((index) => index >= 0);
  const idx = {
    username: find("username", "userid", "user", "id", "usmid"),
    password: find("password", "pass"),
    name: find("name", "displayname", "username"),
    role: find("role", "level", "usertype"),
    station: find("station", "stationcode", "stationname"),
    stations: find("stations", "assignedstations", "sectionstations", "section"),
    department: find("department", "dept"),
    phone: find("phone", "mobile", "mobilenumber", "phonenumber"),
  };
  const imported = {};
  rows.slice(1).forEach((row) => {
    const username = (row[idx.username] || "").trim().toLowerCase();
    const password = (row[idx.password] || "").trim();
    if (!username || !password) return;
    imported[username] = {
      password,
      name: (row[idx.name] || username).trim(),
      role: normalizeRole(row[idx.role]),
      station: (row[idx.station] || "").trim(),
      stations: splitStations(row[idx.stations]),
      department: (row[idx.department] || "").trim(),
      phone: (row[idx.phone] || "").trim(),
    };
  });
  return imported;
}

async function importUsersFromFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.name.toLowerCase().endsWith(".xlsx")) {
    showToast("Please save the Excel file as CSV, then upload it here.");
    event.target.value = "";
    return;
  }
  const text = await file.text();
  const rows = /<table|<tr/i.test(text) ? parseHtmlTable(text) : parseDelimited(text);
  const imported = rowsToUsers(rows);
  const count = Object.keys(imported).length;
  if (!count) {
    showToast("No users imported. Check columns: username, password, role.");
    return;
  }
  const mode = qs("#importMode").value;
  if (mode === "replace") {
    delete imported[state.user.username];
    state.users = { ...imported, [state.user.username]: state.users[state.user.username] };
  } else {
    state.users = { ...state.users, ...imported };
  }
  saveUsers();
  syncUsersToGoogleSheet(imported);
  showToast(`${count} user IDs imported`);
  renderUserManagement();
}

function saveEditedUser(username) {
  const kind = qs(`[data-save-user="${CSS.escape(username)}"]`)?.dataset.userKind || (state.inactiveUsers[username] ? "inactive" : "active");
  const source = kind === "inactive" ? state.inactiveUsers : state.users;
  const user = { ...source[username] };
  let newStatus = kind === "inactive" ? "inactive" : "active";
  qsa(`[data-user-edit="${CSS.escape(username)}"][data-user-kind="${kind}"]`).forEach((input) => {
    const field = input.dataset.field;
    if (field === "newStatus") {
      newStatus = input.value;
    } else if (field === "stations") {
      user[field] = splitStations(input.value);
    } else {
      user[field] = input.value.trim();
    }
  });
  if (user.role === "supervisor") {
    user.stations = splitStations(user.station);
    user.station = "";
  }
  if (newStatus === "inactive") {
    state.inactiveUsers[username] = user;
    delete state.users[username];
    syncUserToGoogleSheet(username, user, "deleteUser");
  } else {
    state.users[username] = user;
    delete state.inactiveUsers[username];
    syncUserToGoogleSheet(username, user, "saveUser");
  }
  if (state.user.username === username) state.user = { ...state.user, ...user };
  saveUsers();
  saveInactiveUsers();
  saveUser();
  showToast(`${username} saved`);
  renderUserManagement();
}

function createNewUser() {
  const username = qs("#newUserId")?.value.trim().toLowerCase();
  const password = qs("#newUserPassword")?.value.trim();
  const name = qs("#newUserName")?.value.trim();
  const role = qs("#newUserRole")?.value;
  const station = qs("#newUserStation")?.value.trim();
  const stationsText = qs("#newUserStations")?.value.trim();
  const department = qs("#newUserDepartment")?.value.trim();
  const phone = qs("#newUserPhone")?.value.trim();

  if (!username || !password || !name || !role) {
    showToast("User ID, password, name, and role are required.");
    return;
  }
  if (state.users[username]) {
    showToast("This user ID already exists. Edit it in Current users.");
    return;
  }
  if (state.inactiveUsers[username]) {
    showToast("This user ID exists in Inactive users. Activate it or save changes there.");
    return;
  }
  if (role === "station-manager" && !station) {
    showToast("Station is required for Station Manager users.");
    return;
  }
  if (["control", "bo", "department"].includes(role) && !department) {
    showToast("Department is required for this role.");
    return;
  }
  if (role === "supervisor" && !stationsText) {
    showToast("Assigned stations are required for Supervisor users.");
    return;
  }

  const user = {
    password,
    name,
    role,
    station,
    stations: splitStations(stationsText),
    department,
    phone,
  };
  state.users[username] = user;
  delete state.inactiveUsers[username];
  saveUsers();
  saveInactiveUsers();
  syncUserToGoogleSheet(username, user, "saveUser");
  showToast(`${username} created and saved`);
  renderUserManagement();
}

function clearNewUserForm() {

function deleteUser(username) {
  if (username === state.user.username) {
    showToast("Current super user cannot delete itself.");
    return;
  }
  const user = state.users[username];
  user.reason = user.reason || "De-activated by super user";
  state.inactiveUsers[username] = user;
  delete state.users[username];
  saveUsers();
  saveInactiveUsers();
  syncUserToGoogleSheet(username, user, "deleteUser");
  showToast(`${username} de-activated`);
  renderUserManagement();
}

function activateUser(username) {
  const user = state.inactiveUsers[username];
  if (!user) return;
  user.reason = "";
  state.users[username] = user;
  delete state.inactiveUsers[username];
  saveUsers();
  saveInactiveUsers();
  syncUserToGoogleSheet(username, user, "saveUser");
  showToast(`${username} activated`);
  renderUserManagement();
}

    ["boengg", "pass123", "BO Engineering", "bo", "", "", "Engineering", "9000000004"],
  ];
  const csv = rows.map((row) => row.map((cell) => `"${String(cell).replaceAll('"', '""')}"`).join(",")).join("\n");

}

function saveSheetsUrl() {

    showToast("Complaint and User ID Apps Script URLs must be different.");
    return;
  }
  if (!url) {
    localStorage.removeItem(sheetsUrlKey);
  } else {
    localStorage.setItem(sheetsUrlKey, url);
  }
  if (!userUrl) {
    localStorage.removeItem(userSheetsUrlKey);
  } else {
    localStorage.setItem(userSheetsUrlKey, userUrl);
  }
  startGoogleSheetAutoSync();
  showToast("Google Sheet sync URLs saved");
}
